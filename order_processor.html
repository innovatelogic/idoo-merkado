<body>
<script>

  let order_tables = [];
  let order_buckets = {};
  let checked_orders = new Set();

  google.script.run.withSuccessHandler(function(data) {
    order_tables = data;
    const select = document.getElementById("order-table");
    select.innerHTML = order_tables.map((table, idx) =>
      `<option value="${table}" item-idx="${idx}">
        ${table}
      </option>`
    ).join('');

    select.onchange = function() {
      const index = this.selectedIndex;
      init_form(order_tables[index]);
    };

    init_form(order_tables[0]);
  }).get_order_tables();


document.addEventListener("DOMContentLoaded", function () {
  const cb0 = document.getElementById("select-all-0");
  const cb1 = document.getElementById("select-all-1");

  if (cb0) {
    cb0.addEventListener("change", function () {
      toggle_all_orders(0, this);
    });
  }

  if (cb1) {
    cb1.addEventListener("change", function () {
      toggle_all_orders(1, this);
    });
  }
});

//----------------------------------------------------------------------------------------------
function init_form(table_name) {
  google.script.run.withSuccessHandler(function(data) {
    
    clear_all();

    order_buckets = data;

    for (const [key, obj] of Object.entries(data.open)) {
      if (!obj || !obj.orders) { continue; }

      for (const [orderId, orderArray] of Object.entries(obj.orders)) {
        add_order_block(key, orderId, orderArray);
      }
    }

    for (const [key, obj] of Object.entries(data.cancelled)) {
      if (!obj || !obj.orders) { continue; }
      for (const [orderId, orderArray] of Object.entries(obj.orders)) {
          add_order_cancelled("order-cancelled-bucket-" + key, orderId, orderArray);
      }
    }

    /*for (order of data.closed){
      add_order_closed("order-closed", order);
    }*/

  }).prepare_calculation_info(table_name);
}

//----------------------------------------------------------------------------------------------
function clear_all()
{
  order_buckets = {};
  checked_orders.clear();

  clear_table_rows('order-bucket-0');
  clear_table_rows('order-bucket-1');
  clear_table_rows('order-cancelled-bucket-0');
  clear_table_rows('order-cancelled-bucket-1');
  //clear_table_rows('order-closed');

  document.getElementById("select-all-0").checked = false;
  document.getElementById("select-all-1").checked = false;

  update_summary_table(0);
  update_summary_table(1);
}

//----------------------------------------------------------------------------------------------
function add_order_block(bucket_id, orderId, orderArray) {
  const table = document.getElementById("order-bucket-" + bucket_id);
  const tbody = table.tBodies[0];

  const rowspan = orderArray.length;

  orderArray.forEach((row, index) => {
    const tr = tbody.insertRow();
    
    if (index === 0) {
      // Checkbox cell with rowspan
      const tdCheckbox = tr.insertCell();
      tdCheckbox.className = "checkbox-cell";
      tdCheckbox.rowSpan = rowspan;

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.dataset.orderId = orderId;
      checkbox.dataset.bucketId = bucket_id;
      checkbox.dataset.rowspan = rowspan;

      checkbox.addEventListener("change", function () {
        if (this.checked){
          checked_orders.add(orderId);
        } else {
          checked_orders.delete(orderId);
        }
        highlight_order_rows(tr, rowspan, this.checked);

        recalculate_bucket(Number(bucket_id));
      });

      tdCheckbox.appendChild(checkbox);

      // Order ID cell with rowspan
      const tdOrderId = tr.insertCell();
      tdOrderId.className = "order-id-cell";
      tdOrderId.rowSpan = rowspan;
      tdOrderId.textContent = orderId;
    }

    // Suborder cells (account, total, base, profit)
    const tdAccount = tr.insertCell();
    tdAccount.textContent = row.account;

    const tdTotal = tr.insertCell();
    tdTotal.textContent = Number(row.total).toFixed(2);

    const tdBase = tr.insertCell();
    tdBase.textContent = Number(row.base).toFixed(2);

    const tdProfit = tr.insertCell();
    tdProfit.textContent = Number(row.profit).toFixed(2);
  });
}

//----------------------------------------------------------------------------------------------
function add_order_cancelled(tableId, orderId, orderArray) {
  const table = document.getElementById(tableId);
  const tbody = table.tBodies[0];

  const rowspan = orderArray.length;

  orderArray.forEach((row, index) => {
    const tr = tbody.insertRow();
    
    if (index === 0) {
      // Order ID cell with rowspan
      const tdOrderId = tr.insertCell();
      tdOrderId.className = "order-id-cell";
      tdOrderId.rowSpan = rowspan;
      tdOrderId.textContent = orderId;
    }

    // Suborder cells (account, total)
    const tdAccount = tr.insertCell();
    tdAccount.textContent = row.account;

    const tdTotal = tr.insertCell();
    tdTotal.textContent = Number(row.total).toFixed(2);
  });
}

//----------------------------------------------------------------------------------------------
function add_order_closed(tableId, order) {
  const table = document.getElementById(tableId);
  const tbody = table.tBodies[0];

  const tr = tbody.insertRow();
    
  // Suborder cells (account, total)
  const td = tr.insertCell();
  td.textContent = order;
}

//----------------------------------------------------------------------------------------------
function clear_table_rows(table_id) {
  const table = document.getElementById(table_id);
  if (!table) return;
  table.tBodies[0].innerHTML = "";
}

//----------------------------------------------------------------------------------------------
function highlight_order_rows(startRow, rowspan, checked) {
  let row = startRow;

  for (let i = 0; i < rowspan; i++) {
    if (checked) {
      row.classList.add("highlighted");
    } else {
      row.classList.remove("highlighted");
    }
    row = row.nextElementSibling;
  }
}

//----------------------------------------------------------------------------------------------
function toggle_all_orders(bucket_id, headerCheckbox) {
  const table = document.getElementById("order-bucket-" + bucket_id);
  const checkboxes = table.querySelectorAll("tbody input[type='checkbox']");

  checkboxes.forEach(cb => {
    cb.checked = headerCheckbox.checked;

    const orderId = cb.dataset.orderId;

    if (headerCheckbox.checked) {
      checked_orders.add(orderId);
    } else {
      checked_orders.delete(orderId);
    }
    const tr = cb.closest("tr");
    const rowspan = Number(cb.dataset.rowspan) || 1;

    highlight_order_rows(tr, rowspan, headerCheckbox.checked);
  });

  recalculate_bucket(bucket_id);
}

//----------------------------------------------------------------------------------------------
function recalculate_bucket(bucket_id)
{
  const bucket = order_buckets.open[bucket_id];
  if (!bucket || !bucket.orders) {
    return;
  }

  let total = 0;
  let base = 0;
  let profit = 0;

  // Loop over all orders in this bucket
  for (const [orderId, orderArray] of Object.entries(bucket.orders)) {
    if (!checked_orders.has(orderId)) continue; // only sum checked orders

    for (const row of orderArray) {
      total += parseFloat(row.total) || 0;
      base += parseFloat(row.base) || 0;
      profit += parseFloat(row.profit) || 0;
    }
  }

  update_summary_table(bucket_id, total, base, profit);
}

//----------------------------------------------------------------------------------------------
function update_summary_table(bucket_id, total = 0, base = 0, profit = 0)
{
  const totalCell = document.getElementById("total_bucket_" + bucket_id);
  const baseCell = document.getElementById("base_bucket_" + bucket_id);
  const profitCell = document.getElementById("profit_bucket_" + bucket_id);

  if (totalCell) totalCell.textContent = total.toFixed(2) + " грн";
  if (baseCell) baseCell.textContent = base.toFixed(2) + " грн";
  if (profitCell) profitCell.textContent = profit.toFixed(2) + " грн";
}

//----------------------------------------------------------------------------------------------
function close_modal() {
  document.getElementById("confirmModal").style.display = "none";
  document.body.classList.remove("modal-open");
}

//----------------------------------------------------------------------------------------------
function confirm_submit() {
  const confirmBtn = document.querySelector(".confirm-btn");
  confirmBtn.disabled = true;
  confirmBtn.innerText = "Processing...";

  document.getElementById("addItemBtn").disabled = true;

  google.script.run.withSuccessHandler(function(response) {
    
      // Load items from Google Sheets
    google.script.run.withSuccessHandler(function(data) {

      close_modal();
      
      reset_form();
      confirmBtn.disabled = false;
      confirmBtn.innerText = "Підтвердити";

      items = data;
      document.getElementById("addItemBtn").disabled = false;
      document.getElementById('positions').replaceChildren();

      const select = document.getElementById('payment_select');
      select.selectedIndex = 0; // selects the first option (placeholder)

      add_position(); // start with a new blank position
      updateTotalOrder();

    }).deserialize_articuls();

  }).withFailureHandler(function(error) {
    alert("Error adding order: " + error.message);
    confirmBtn.disabled = false;
    confirmBtn.innerText = "Підтвердити";
  }).add_order('Orders_v2', pending_order_data);
}
</script>
